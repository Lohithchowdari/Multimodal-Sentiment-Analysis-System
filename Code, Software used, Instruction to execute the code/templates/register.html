{% extends "base.html" %}

{% block title %}Register - MindSync AI{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div style="max-width: 500px; margin: 0 auto;">
            <div class="card">
                <div class="text-center mb-4">
                    <div style="width: 80px; height: 80px; margin: 0 auto 1.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem;">
                        <i class="fas fa-brain"></i>
                    </div>
                    <h2>Create Your Account</h2>
                    <p style="color: var(--text-muted); margin-top: 0.5rem;">Join MindSync AI and start your journey</p>
                </div>
                
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" 
                               id="email" 
                               name="email" 
                               class="form-control" 
                               placeholder="your@email.com"
                               required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" 
                               id="password" 
                               name="password" 
                               class="form-control" 
                               placeholder="Enter a strong password"
                               required
                               minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" 
                               id="confirm_password" 
                               name="confirm_password" 
                               class="form-control" 
                               placeholder="Re-enter your password"
                               required
                               minlength="6">
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        <i class="fas fa-user-plus"></i>
                        Create Account
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <p style="color: var(--text-muted);">
                        Already have an account? 
                        <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">
                            Login here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
